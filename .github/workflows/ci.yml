name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality-check:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enforce supported Python range
        run: |
          python -c "import sys; v=sys.version_info; print(f'Python detected: {v.major}.{v.minor}.{v.micro}'); raise SystemExit(1 if v >= (3,14) else 0)"

      - name: Install dependencies
        run: python -m pip install --upgrade pip; python -m pip install -r requirements.txt

      - name: Compile project
        run: |
          python -m py_compile youtube_downloader.py app_paths.py app_logging.py app_dependencies.py app_core.py app_workers.py app_dialogs.py app_main_window.py app_i18n.py
