name: Build Windows Executable

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile --name YouTubeDownloader --icon assets/icon.ico --add-data "assets;assets" youtube_downloader.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-windows
          path: dist/YouTubeDownloader.exe

      - name: Attach executable to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YouTubeDownloader.exe
          tag_name: ${{ github.event.release.tag_name }}
